    function getFbc() {
  // Paso 1: Revisa si hay fbclid en la URL actual
  const urlParams = new URLSearchParams(window.location.search);
  const fbclid = urlParams.get('fbclid');

  if (fbclid) {
    // Formato oficial de Meta: versión.subdominio.tiempo.fbclid
    const fbc = `fb.1.${Date.now()}.${fbclid}`;

    // Guárdalo 90 días porque el usuario puede convertir después
    document.cookie = `_fbc=${fbc}; path=/; max-age=7776000; SameSite=Lax`;
    return fbc;
  }

  // Paso 2: Si no hay en URL, busca si ya lo guardaste antes
  const cookieValue = document.cookie
   .split('; ')
   .find(row => row.startsWith('_fbc='))
   ?.split('=')[1];

  return cookieValue || null;
}

function getFbp() {
  const cookieValue = document.cookie
   .split('; ')
   .find(row => row.startsWith('_fbp='))
   ?.split('=')[1];

  return cookieValue || null;
}

    const formData = {

        fbc: getFbc(), // fb.1.1712681234.IwAR0abc... o null
        eventId: eventId, // El mismo que usas en fbq
        userAgent: navigator.userAgent,
        pageUrl: window.location.href
